<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mrs. Marina Latif</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* DARK MODE ONLY */
    :root {
      --bg-primary: #0b0f0c;
      --bg-secondary: #111a14;
      --bg-elevated: #1a241e;
      --bg-card: #1a221c;
      --surface-glass: rgba(30, 40, 34, 0.65);
      --accent-primary: #5ef0a3;
      --accent-glow: #3ad886;
      --accent-secondary: #6cc9ff;
      --text-main: #edf5ef;
      --text-muted: #b3cfbc;
      --border-glow: rgba(94, 240, 163, 0.3);
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 10px 25px -5px rgba(94, 240, 163, 0.25);
      --gradient-1: linear-gradient(135deg, #1c2e24 0%, #0c1610 100%);
      --gradient-card: linear-gradient(145deg, #1f2b24, #141e18);
      --transition-fast: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-main);
      font-family: 'Cairo', 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
      transition: all 0.3s ease;
    }

    body[dir="ltr"] {
      text-align: left;
    }
    body[dir="rtl"] {
      text-align: right;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(94, 240, 163, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* Language Switcher */
    .lang-switch {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
      gap: 12px;
    }
    .lang-btn {
      background: rgba(30, 40, 34, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid var(--accent-primary);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .lang-btn.active {
      background: var(--accent-primary);
      color: #0a120e;
      border-color: var(--accent-primary);
    }
    .lang-btn:hover {
      transform: translateY(-2px);
      background: var(--accent-primary);
      color: #0a120e;
    }

    .hero-section {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 2rem 1rem 1.5rem;
      border-radius: 3rem;
      background: var(--gradient-1);
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(94, 240, 163, 0.2);
    }

    .hero-title {
      font-size: clamp(2rem, 7vw, 3.8rem);
      font-weight: 800;
      background: linear-gradient(to right, #e3ffe8, var(--accent-primary), #a0f5d0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .hero-sub {
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: var(--text-muted);
      background: rgba(0,0,0,0.3);
      display: inline-block;
      padding: 0.4rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-weight: 500;
    }

    .profile-card {
      background: var(--gradient-card);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      margin-bottom: 2.5rem;
      box-shadow: var(--shadow-glow), 0 20px 35px -12px rgba(0,0,0,0.5);
      border: 1px solid rgba(94, 240, 163, 0.25);
      transition: transform 0.25s ease, box-shadow 0.3s;
    }

    .profile-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 40px -15px rgba(94, 240, 163, 0.3);
    }

    .avatar-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.2rem;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(94, 240, 163, 0.2), 0 15px 25px -8px black;
      transition: var(--transition-fast);
    }

    @media (min-width: 768px) {
      .avatar {
        width: 180px;
        height: 180px;
      }
    }

    .profile-name {
      text-align: center;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .badge-science {
      display: inline-block;
      background: rgba(94, 240, 163, 0.15);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-primary);
      margin-bottom: 1.2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-item {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 1.5rem;
      padding: 1rem 0.5rem;
      text-align: center;
      transition: all 0.2s;
      border: 1px solid rgba(94, 240, 163, 0.2);
    }

    .stat-item i {
      font-size: 1.7rem;
      color: var(--accent-primary);
      margin-bottom: 0.4rem;
      display: inline-block;
    }

    .stat-value {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--accent-primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0 2.2rem;
    }

    .btn-social {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.25s ease;
      background: rgba(20, 30, 24, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      box-shadow: 0 8px 14px -8px rgba(0, 0, 0, 0.5);
      flex: 0 1 auto;
      min-width: 160px;
    }

    .btn-social i {
      font-size: 1.4rem;
    }

    .btn-wa {
      background: #25d36620;
      border-left: 3px solid #25d366;
    }
    body[dir="rtl"] .btn-wa {
      border-left: none;
      border-right: 3px solid #25d366;
    }

    .btn-fb {
      background: #1877f220;
      border-left: 3px solid #1877f2;
    }
    body[dir="rtl"] .btn-fb {
      border-left: none;
      border-right: 3px solid #1877f2;
    }

    .btn-social:hover {
      transform: translateY(-5px);
      background: rgba(30, 45, 38, 0.95);
      border-color: var(--accent-primary);
    }

    .contact-section {
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      border: 1px solid rgba(94, 240, 163, 0.3);
      box-shadow: 0 20px 32px -12px black;
      margin-top: 1rem;
    }

    .section-title {
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .section-title i {
      color: var(--accent-primary);
      font-size: 2rem;
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 1rem 1.3rem;
      background: rgba(10, 18, 12, 0.7);
      border: 1px solid rgba(94, 240, 163, 0.3);
      border-radius: 2rem;
      font-family: 'Cairo', 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--text-main);
      transition: all 0.2s;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(94, 240, 163, 0.2);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(105deg, var(--accent-primary), #3ad886);
      border: none;
      padding: 1rem;
      font-size: 1.25rem;
      font-weight: 700;
      border-radius: 3rem;
      color: #0a120e;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: inherit;
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    .submit-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-2px);
    }

    #statusMsg {
      margin-top: 1.2rem;
      text-align: center;
      font-weight: 500;
      padding: 0.6rem;
      border-radius: 2rem;
      background: rgba(0,0,0,0.3);
    }

    .footer-note {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      body { padding: 0.9rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .btn-social { width: 100%; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    .profile-card, .btn-social, .submit-btn {
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
  </style>
</head>
<body dir="rtl">
  <div class="container">
    <!-- Language Switcher -->
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-ar">AR</button>
      <button class="lang-btn" id="btn-en">EN</button>
    </div>

    <div class="hero-section">
      <h1 class="hero-title" id="heroTitle">🔬 المُعلمة مارينا لطيف</h1>
      <div class="hero-sub" id="heroSub">مُدرسة علوم/ساينس ابتدائي واعدادي</div>
    </div>

    <div class="profile-card">
      <div class="avatar-wrapper">
        <img class="avatar" src="https://i.postimg.cc/kXzfQzdv/IMG-20260319-220452.jpg" alt="Marina Latif" onerror="this.src='https://placehold.co/400x400/1a241e/5ef0a3?text=🔬'">
      </div>
      <div class="profile-name" id="profileName">Mrs. Marina Latif</div>
      <div style="text-align: center;">
        <span class="badge-science" id="badgeText"><i class="fas fa-flask"></i> 7 سنوات من التميز</span>
      </div>
      
      <div class="stats-grid">
        <div class="stat-item">
          <i class="fas fa-user-graduate"></i>
          <div class="stat-value">28</div>
          <div class="stat-label" id="statAge">العمر</div>
        </div>
        <div class="stat-item">
          <i class="fas fa-calendar-alt"></i>
          <div class="stat-value">2019</div>
          <div class="stat-label" id="statSince">بداية المسيرة</div>
        </div>
        <div class="stat-item">
          <i class="fas fa-chalkboard-user"></i>
          <div class="stat-value">7</div>
          <div class="stat-label" id="statExp">سنوات خبرة</div>
        </div>
        <div class="stat-item">
          <i class="fas fa-star-of-life"></i>
          <div class="stat-value" id="statGradeVal">جيد مرتفع</div>
          <div class="stat-label" id="statGrade">تقدير التخرج</div>
        </div>
        <div class="stat-item">
          <i class="fas fa-microscope"></i>
          <div class="stat-value" id="statDegreeVal">علوم وتربية</div>
          <div class="stat-label" id="statDegree">بكالوريوس</div>
        </div>
      </div>
    </div>

    <div class="social-links">
      <a href="https://wa.me/201229971386" target="_blank" class="btn-social btn-wa" id="whatsappBtn">
        <i class="fab fa-whatsapp"></i> <span id="whatsappText">واتساب</span>
      </a>
      <a href="https://www.facebook.com/share/1Dfopagizi/" target="_blank" class="btn-social btn-fb" id="facebookBtn">
        <i class="fab fa-facebook-f"></i> <span id="facebookText">فيسبوك</span>
      </a>
    </div>

    <div class="contact-section">
      <div class="section-title">
        <i class="fas fa-envelope-open-text"></i>
        <span id="contactTitle">تواصل مع الأستاذة</span>
      </div>
      <form class="contact-form" id="teacherContactForm">
        <div class="form-group">
          <input type="text" name="name" id="inputName" placeholder="👤 اسم الطالب / ولي الأمر" required autocomplete="name">
        </div>
        <div class="form-group">
          <input type="tel" name="phone" id="inputPhone" placeholder="📞 رقم الهاتف (واتساب)" required autocomplete="tel">
        </div>
        <div class="form-group">
          <textarea name="message" id="inputMessage" rows="4" placeholder="💬 اكتب رسالتك هنا ... استفسار عن الدروس، تسجيل، أو أي سؤال" required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtnText">
          <i class="fas fa-paper-plane"></i> <span id="submitSpan">إرسال الرسالة</span>
        </button>
        <div id="statusMsg"></div>
      </form>
    </div>
    <div class="footer-note" id="footerNote">
      <i class="fas fa-atom"></i> العلم ممتع مع مارينا لطيف
    </div>
  </div>

  <script>
    // Bilingual Dictionary
    const translations = {
      ar: {
        heroTitle: "🔬 المُعلمة مارينا لطيف",
        heroSub: "مُدرسة علوم/ساينس ابتدائي واعدادي",
        profileName: "Marina Latif",
        badge: "<i class='fas fa-flask'></i> 7 سنوات من التميز",
        statAge: "العمر",
        statSince: "بداية المسيرة",
        statExp: "سنوات خبرة",
        statGrade: "تقدير التخرج",
        statGradeVal: "جيد مرتفع",
        statDegree: "بكالوريوس",
        statDegreeVal: "علوم وتربية",
        whatsapp: "واتساب",
        facebook: "فيسبوك",
        contactTitle: "تواصل مع الأستاذة",
        namePlaceholder: "👤 اسم الطالب / ولي الأمر",
        phonePlaceholder: "📞 رقم الهاتف (واتساب)",
        messagePlaceholder: "💬 اكتب رسالتك هنا ... استفسار عن الدروس، تسجيل، أو أي سؤال",
        submitBtn: "إرسال الرسالة",
        footer: "<i class='fas fa-atom'></i> العلم ممتع مع مارينا لطيف",
        successMsg: "✅ تم الإرسال بنجاح! سأتواصل معك قريبًا 📚✨",
        sendingMsg: "⏳ جاري إرسال الرسالة...",
        errorMsg: "❌ حدث خطأ، حاول مرة أخرى",
        networkError: "❌ خطأ في الشبكة"
      },
      en: {
        heroTitle: "🔬 Mrs. Marina Latif",
        heroSub: "Science Teacher | Primary & Preparatory",
        profileName: "Marina Latif",
        badge: "<i class='fas fa-flask'></i> 7+ Years of Excellence",
        statAge: "Age",
        statSince: "Since",
        statExp: "Experience",
        statGrade: "Grade",
        statGradeVal: "Good Honor",
        statDegree: "Degree",
        statDegreeVal: "Science & Education",
        whatsapp: "WhatsApp",
        facebook: "Facebook",
        contactTitle: "Contact Mrs. Marina",
        namePlaceholder: "👤 Student / Parent Name",
        phonePlaceholder: "📞 Phone Number (WhatsApp)",
        messagePlaceholder: "💬 Write your message here... Questions about lessons, registration, etc.",
        submitBtn: "Send Message",
        footer: "<i class='fas fa-atom'></i> Science is fun with Marina Latif",
        successMsg: "✅ Message sent successfully! I'll contact you soon 📚✨",
        sendingMsg: "⏳ Sending message...",
        errorMsg: "❌ An error occurred, please try again",
        networkError: "❌ Network error"
      }
    };

    let currentLang = 'ar';

    function setLanguage(lang) {
      currentLang = lang;
      const t = translations[lang];
      
      document.getElementById('heroTitle').innerHTML = t.heroTitle;
      document.getElementById('heroSub').innerHTML = t.heroSub;
      document.getElementById('profileName').innerHTML = t.profileName;
      document.getElementById('badgeText').innerHTML = t.badge;
      document.getElementById('statAge').innerHTML = t.statAge;
      document.getElementById('statSince').innerHTML = t.statSince;
      document.getElementById('statExp').innerHTML = t.statExp;
      document.getElementById('statGrade').innerHTML = t.statGrade;
      document.getElementById('statGradeVal').innerHTML = t.statGradeVal;
      document.getElementById('statDegree').innerHTML = t.statDegree;
      document.getElementById('statDegreeVal').innerHTML = t.statDegreeVal;
      document.getElementById('whatsappText').innerHTML = t.whatsapp;
      document.getElementById('facebookText').innerHTML = t.facebook;
      document.getElementById('contactTitle').innerHTML = t.contactTitle;
      document.getElementById('inputName').placeholder = t.namePlaceholder;
      document.getElementById('inputPhone').placeholder = t.phonePlaceholder;
      document.getElementById('inputMessage').placeholder = t.messagePlaceholder;
      document.getElementById('submitSpan').innerHTML = t.submitBtn;
      document.getElementById('footerNote').innerHTML = t.footer;
      
      // Update direction
      if (lang === 'ar') {
        document.body.setAttribute('dir', 'rtl');
        document.documentElement.setAttribute('lang', 'ar');
      } else {
        document.body.setAttribute('dir', 'ltr');
        document.documentElement.setAttribute('lang', 'en');
      }
      
      // Active button style
      document.getElementById('btn-ar').classList.remove('active');
      document.getElementById('btn-en').classList.remove('active');
      if (lang === 'ar') document.getElementById('btn-ar').classList.add('active');
      else document.getElementById('btn-en').classList.add('active');
    }

    document.getElementById('btn-ar').addEventListener('click', () => setLanguage('ar'));
    document.getElementById('btn-en').addEventListener('click', () => setLanguage('en'));

    // Form submission
    const form = document.getElementById('teacherContactForm');
    const statusDiv = document.getElementById('statusMsg');

    function setStatus(message, isError = false) {
      if (!statusDiv) return;
      statusDiv.textContent = message;
      statusDiv.style.color = isError ? '#ffb5a7' : '#a3f0c0';
      statusDiv.style.backgroundColor = isError ? 'rgba(255,70,70,0.1)' : 'rgba(94,240,163,0.1)';
      if (!isError) {
        setTimeout(() => {
          if (statusDiv.textContent === message) {
            statusDiv.textContent = '';
            statusDiv.style.backgroundColor = 'transparent';
          }
        }, 5000);
      }
    }

    async function submitFormData(data) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (response.ok) return { success: true };
        else return { success: false, error: translations[currentLang].errorMsg };
      } catch (err) {
        clearTimeout(timeoutId);
        return { success: false, error: translations[currentLang].networkError };
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('inputName').value.trim();
      const phone = document.getElementById('inputPhone').value.trim();
      const message = document.getElementById('inputMessage').value.trim();
      
      if (!name || !phone || !message) {
        setStatus(translations[currentLang].errorMsg, true);
        return;
      }
      
      setStatus(translations[currentLang].sendingMsg);
      const result = await submitFormData({ name, phone, message });
      if (result.success) {
        setStatus(translations[currentLang].successMsg);
        form.reset();
      } else {
        setStatus(result.error || translations[currentLang].errorMsg, true);
      }
    });
  </script>
</body>
</html>
