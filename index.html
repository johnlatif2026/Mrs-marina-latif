<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورتفوليو مدرسة العلوم</title>
<style>
:root {
  --bg-color:#121212;
  --text-color:#e0e0e0;
  --accent-color:#4CAF50;
  --input-bg:#1f1f1f;
  --input-border:#333;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: Arial, sans-serif; background:var(--bg-color); color:var(--text-color); line-height:1.6; }
header { background: var(--accent-color); color:white; padding:20px; text-align:center; }
section { padding:20px; max-width:800px; margin:auto; }
.profile img { width:150px; border-radius:50%; display:block; margin:auto; }
.contact-form input, .contact-form textarea { width:100%; padding:10px; margin:10px 0; border:1px solid var(--input-border); border-radius:5px; background:var(--input-bg); color:var(--text-color); }
.contact-form button { padding:10px 20px; background:var(--accent-color); color:white; border:none; cursor:pointer; border-radius:5px; }
.contact-form button:hover { background:#45a049; }
.social a { margin-right:10px; text-decoration:none; color:var(--accent-color); }
@media(max-width:600px){ .profile img{width:120px;} section{padding:10px;} }
</style>
</head>
<body>

<header>
  <h1>مدرسة العلوم - البورتفوليو</h1>
</header>

<section class="profile">
  <img src="profile.jpg" alt="صورة المدرسة">
  <h2>اسم المدرسة</h2>
  <p>العمر: 35 سنة</p>
  <p>التعليم: بكالوريوس علوم</p>
  <p>الخبرة: 10 سنوات في تدريس العلوم</p>
  <p>تبدأ التدريس منذ: 2014</p>
  <p>المواد: علوم، ساينس</p>
</section>

<section class="social">
  <h3>تواصلوا معي عبر:</h3>
  <a href="https://wa.me/201229971386" target="_blank">واتساب</a>
  <a href="https://www.facebook.com/marinalatif" target="_blank">فيسبوك</a>
</section>

<section class="contact">
  <h3>تواصل عبر الموقع</h3>
  <form class="contact-form" id="contactForm">
    <input type="text" name="name" placeholder="اسمك" required>
    <input type="phone" name="phone" placeholder="رقم الهاتف" required>
    <textarea name="message" rows="5" placeholder="رسالتك" required></textarea>
    <button type="submit">إرسال</button>
  </form>
  <p id="status"></p>
</section>

<script>
document.getElementById('contactForm').addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = {
    name: formData.get('name'),
    phone: formData.get('phone'),
    message: formData.get('message')
  };
  
  try {
    const res = await fetch('/api/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    if(res.ok){
      document.getElementById('status').textContent = "تم إرسال الرسالة بنجاح!";
      e.target.reset();
    } else {
      const err = await res.json();
      document.getElementById('status').textContent = "حدث خطأ: " + (err.error || 'حاول مرة أخرى');
      console.error("Server error:", err);
    }
  } catch(err){
    document.getElementById('status').textContent = "حدث خطأ: " + err.message;
    console.error("Fetch error:", err);
  }
});
</script>

</body>
</html>
