<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Teacher</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }

body {
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
  text-align:center;
}

.container {
  padding:40px 20px;
}

h1 {
  font-size:2.5rem;
  margin-bottom:10px;
}

p {
  opacity:0.8;
  margin-bottom:20px;
}

.btn {
  padding:12px 25px;
  background:#00c9a7;
  border:none;
  border-radius:25px;
  cursor:pointer;
  font-size:16px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
}

</style>
</head>

<body>

<div class="container">
  <h1>👩‍🔬 Science Learning Hub</h1>
  <p>تعلم العلوم بطريقة سهلة وممتعة مع شرح مبسط وتجارب تفاعلية</p>

  <a href="/login.html">
    <button class="btn">دخول الأدمن</button>
  </a>

  <div class="cards">
    <div class="card">🧬 Biology</div>
    <div class="card">⚗️ Chemistry</div>
    <div class="card">⚡ Physics</div>
  </div>
</div>

</body>
</html>
