<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width">
<title>Science Teacher</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f4f4}
section{padding:20px}
input,textarea{width:90%;padding:10px;margin:5px}
button{padding:10px;background:#00c9a7;border:none}
</style>
</head>

<body>

<h1>👩‍🔬 مدرسة علوم</h1>

<section>
<h2>تواصل معي</h2>

<input id="name" placeholder="اسمك">
<input id="phone" placeholder="رقمك">
<textarea id="msg" placeholder="رسالتك"></textarea>

<button onclick="send()">إرسال</button>
</section>

<script>
async function send(){
  await fetch('/api/contact',{
    method:'POST',
    body: JSON.stringify({
      name:name.value,
      phone:phone.value,
      message:msg.value
    })
  });

  alert("تم الإرسال ✅");
}
</script>

</body>
</html>
