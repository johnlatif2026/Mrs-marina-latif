<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Science Teacher</title>
</head>
<body>
  <h1>مرحبا بكم في بورتفوليو مدرسة العلوم</h1>

  <h2>آخر الدروس</h2>
  <ul id="posts"></ul>

  <script>
    fetch('/api/posts')
      .then(res => res.json())
      .then(posts => {
        const ul = document.getElementById('posts');
        posts.forEach(post => {
          const li = document.createElement('li');
          li.textContent = post.title + ' - ' + post.description;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
