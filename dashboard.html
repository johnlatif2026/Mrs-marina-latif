<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>
<body>
  <h1>لوحة التحكم</h1>

  <h2>إضافة درس جديد</h2>
  <form id="addPostForm">
    <input type="text" name="title" placeholder="عنوان الدرس" required>
    <input type="text" name="description" placeholder="وصف الدرس" required>
    <button type="submit">إضافة</button>
  </form>

  <h2>قائمة الدروس</h2>
  <ul id="posts"></ul>

  <script>
    async function loadPosts() {
      const res = await fetch('/api/posts', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
      const posts = await res.json();
      const ul = document.getElementById('posts');
      ul.innerHTML = '';
      posts.forEach(post => {
        const li = document.createElement('li');
        li.textContent = post.title + ' - ' + post.description;
        ul.appendChild(li);
      });
    }

    document.getElementById('addPostForm').addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = { title: formData.get('title'), description: formData.get('description') };
      await fetch('/api/posts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify(data)
      });
      e.target.reset();
      loadPosts();
    });

    loadPosts();
  </script>
</body>
</html>
