<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - الرسائل</title>
<style>
:root {
  --bg-color:#121212;
  --text-color:#e0e0e0;
  --accent-color:#4CAF50;
  --table-bg:#1f1f1f;
  --table-border:#333;
  --button-bg:#f44336;
  --button-hover:#e53935;
}
body { font-family: Arial, sans-serif; background:var(--bg-color); color:var(--text-color); margin:0; padding:0; }
header { background:var(--accent-color); color:white; padding:20px; text-align:center; position:relative; }
.logout { position:absolute; right:20px; top:20px; background:var(--button-bg); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; }
.logout:hover { background:var(--button-hover); }
.container { padding:20px; max-width:1000px; margin:auto; overflow-x:auto; }
table { width:100%; border-collapse: collapse; background:var(--table-bg); }
th, td { padding:10px; border-bottom:1px solid var(--table-border); text-align:left; }
th { background:var(--accent-color); color:white; }
tr:hover { background:#2a2a2a; }
@media(max-width:600px){ th, td{ font-size:14px; padding:8px; } }
</style>
</head>
<body>

<header>
  <h1>لوحة الرسائل الواردة</h1>
  <button class="logout" onclick="logout()">تسجيل الخروج</button>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>الاسم</th>
        <th>رقم الهاتف</th>
        <th>الرسالة</th>
        <th>تاريخ الإرسال</th>
      </tr>
    </thead>
    <tbody id="messagesBody">
    </tbody>
  </table>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href = '/login';

async function loadMessages(){
  try {
    const res = await fetch('/api/messages', { headers:{ 'Authorization':'Bearer ' + token } });
    if(res.ok){
      const messages = await res.json();
      const tbody = document.getElementById('messagesBody');
      tbody.innerHTML = '';
      messages.forEach(msg => {
        let date;
        if(msg.createdAt){
          if(msg.createdAt._seconds) date = new Date(msg.createdAt._seconds*1000);
          else date = new Date(msg.createdAt);
        } else date = new Date();
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${msg.name}</td>
          <td>${msg.phone}</td>
          <td>${msg.message}</td>
          <td>${date.toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      console.error('Failed to load messages');
    }
  } catch(err){
    console.error('Error fetching messages:', err);
  }
}

function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login';
}

loadMessages();
</script>

</body>
</html>
