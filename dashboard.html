<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

header {
  background:#0f2027;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}

button {
  padding:10px;
  background:red;
  color:white;
  border:none;
}
</style>
</head>

<body>

<header>
  <h2>Dashboard</h2>
</header>

<div class="container">
<div class="card">📊 إحصائيات الموقع</div>
<h2>📩 الرسائل</h2>
<button onclick="logout()">Logout</button>
<div id="msgs"></div>

<script>
const token = localStorage.getItem("token");
if(!token) location.href="/login.html";

async function load(){
  const res = await fetch('/api/messages');
  const data = await res.json();
  const msgs = document.getElementById("msgs");
  msgs.innerHTML="";
  data.forEach(m=>{
    const div=document.createElement("div");
    div.innerHTML=`<p>${m.name}</p><p>${m.phone}</p><p>${m.message}</p>
    <button onclick="del('${m.id}')">❌ حذف</button><hr>`;
    msgs.appendChild(div);
  });
}
async function del(id){ await fetch('/api/delete?id='+id); load(); }
function logout(){ localStorage.removeItem("token"); location.href="/"; }

load();
</script>
</body>
</html>
