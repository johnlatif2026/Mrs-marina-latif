<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>لوحة التحكم | Marina Latif</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Dark Mode Only - Premium Design */
    :root {
      --bg-primary: #050b07;
      --bg-secondary: #0c1510;
      --glass-bg: rgba(18, 30, 24, 0.85);
      --glass-border: rgba(94, 240, 163, 0.2);
      --accent-primary: #5ef0a3;
      --accent-glow: #3ad886;
      --accent-secondary: #6cc9ff;
      --text-primary: #edf7ef;
      --text-secondary: #b8d4c2;
      --card-bg: rgba(20, 35, 28, 0.7);
      --table-header: #1e3a2a;
      --table-row: rgba(25, 45, 35, 0.6);
      --table-row-hover: rgba(45, 75, 55, 0.8);
      --danger: #ff7a5c;
      --danger-dark: #ff5a3a;
      --success: #5ef0a3;
      --warning: #ffc107;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 20px rgba(94, 240, 163, 0.2);
      --gradient-bg: linear-gradient(135deg, #0a1912 0%, #030806 100%);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--gradient-bg);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 25% 40%, rgba(94, 240, 163, 0.03) 1px, transparent 1px),
        radial-gradient(circle at 75% 80%, rgba(108, 201, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px, 35px 35px;
      pointer-events: none;
      z-index: 0;
    }

    /* Main Layout */
    .dashboard {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .dashboard-header {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-title h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .header-title p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    .logout-btn {
      background: rgba(255, 122, 92, 0.15);
      border: 1px solid var(--danger);
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      color: var(--danger);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
    }

    .logout-btn:hover {
      background: var(--danger);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 122, 92, 0.3);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.3rem;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-glow);
    }

    .stat-icon {
      width: 55px;
      height: 55px;
      background: rgba(94, 240, 163, 0.1);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--accent-primary);
    }

    .stat-info {
      flex: 1;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Table Section */
    .table-section {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.8rem;
      border: 1px solid var(--glass-border);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .table-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .table-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .refresh-btn {
      background: rgba(94, 240, 163, 0.1);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: var(--accent-primary);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Cairo', sans-serif;
    }

    .refresh-btn:hover {
      background: rgba(94, 240, 163, 0.2);
      transform: rotate(180deg);
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      padding: 0 0.2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: right;
      padding: 1rem 1rem;
      background: var(--table-header);
      color: var(--accent-primary);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    td {
      padding: 1rem 1rem;
      border-bottom: 1px solid rgba(94, 240, 163, 0.1);
      font-size: 0.9rem;
    }

    tr {
      transition: all 0.2s ease;
    }

    tr:hover td {
      background: var(--table-row-hover);
    }

    .message-preview {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .message-preview:hover {
      white-space: normal;
      word-break: break-word;
      background: var(--card-bg);
      position: relative;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 0.5rem;
      border-radius: 0.5rem;
    }

    .delete-btn {
      background: rgba(255, 122, 92, 0.15);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: var(--danger);
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: white;
      transform: scale(1.05);
    }

    .badge-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .no-data {
      text-align: center;
      padding: 3rem !important;
      color: var(--text-secondary);
    }

    .no-data i {
      font-size: 3rem;
      color: var(--accent-primary);
      opacity: 0.5;
      margin-bottom: 1rem;
      display: block;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 1px solid var(--danger);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-icon {
      font-size: 3.5rem;
      color: var(--danger);
      margin-bottom: 1rem;
    }

    .modal-content h3 {
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
    }

    .modal-content p {
      color: var(--text-secondary);
      margin-bottom: 1.8rem;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .modal-btn {
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Cairo', sans-serif;
    }

    .modal-btn.confirm {
      background: var(--danger);
      color: white;
    }

    .modal-btn.confirm:hover {
      background: var(--danger-dark);
      transform: translateY(-2px);
    }

    .modal-btn.cancel {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .modal-btn.cancel:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .toast {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-right: 3px solid var(--success);
      box-shadow: var(--shadow-sm);
      animation: slideInRight 0.3s ease;
      min-width: 280px;
    }

    .toast.error {
      border-right-color: var(--danger);
    }

    .toast.warning {
      border-right-color: var(--warning);
    }

    .toast i {
      font-size: 1.3rem;
    }

    .toast.success i {
      color: var(--success);
    }

    .toast.error i {
      color: var(--danger);
    }

    .toast-message {
      flex: 1;
      font-size: 0.85rem;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .dashboard {
        padding: 1rem;
      }
      
      .dashboard-header {
        flex-direction: column;
        text-align: center;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
      
      .stat-card {
        padding: 1rem;
      }
      
      .stat-icon {
        width: 45px;
        height: 45px;
        font-size: 1.4rem;
      }
      
      .stat-value {
        font-size: 1.5rem;
      }
      
      th, td {
        padding: 0.8rem 0.5rem;
        font-size: 0.8rem;
      }
      
      .message-preview {
        max-width: 150px;
      }
      
      .toast-container {
        right: 1rem;
        left: 1rem;
      }
      
      .toast {
        min-width: auto;
        width: calc(100% - 2rem);
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .table-header {
        flex-direction: column;
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0c1510;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-primary);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-title">
        <h1>
          <i class="fas fa-envelope-open-text"></i>
          لوحة الرسائل الواردة
        </h1>
        <p><i class="fas fa-chalkboard-user"></i> منصة الأستاذة مارينا لطيف</p>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>تسجيل الخروج</span>
      </button>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="totalMessages">0</div>
          <div class="stat-label">إجمالي الرسائل</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="todayMessages">0</div>
          <div class="stat-label">رسائل اليوم</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="uniqueSenders">0</div>
          <div class="stat-label">المرسلين</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="lastUpdate">-</div>
          <div class="stat-label">آخر تحديث</div>
        </div>
      </div>
    </div>

    <!-- Messages Table -->
    <div class="table-section">
      <div class="table-header">
        <h3><i class="fas fa-list-ul"></i> قائمة الرسائل</h3>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i>
          <span>تحديث</span>
        </button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th><i class="fas fa-user"></i> الاسم</th>
              <th><i class="fas fa-phone"></i> الهاتف</th>
              <th><i class="fas fa-comment"></i> الرسالة</th>
              <th><i class="fas fa-calendar"></i> التاريخ</th>
              <th><i class="fas fa-cog"></i></th>
            </tr>
          </thead>
          <tbody id="messagesTableBody">
            <tr>
              <td colspan="5" class="no-data">
                <i class="fas fa-spinner fa-spin"></i>
                جاري تحميل الرسائل...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-content">
      <div class="modal-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h3>تأكيد الحذف</h3>
      <p id="deleteMessageText">هل أنت متأكد من حذف هذه الرسالة؟</p>
      <div class="modal-buttons">
        <button class="modal-btn confirm" id="confirmDeleteBtn">نعم، احذف</button>
        <button class="modal-btn cancel" id="cancelDeleteBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ===== Configuration =====
    let currentDeleteId = null;
    let messagesData = [];
    let autoRefreshInterval = null;

    // Get token from localStorage
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/login';
    }

    // ===== Toast Notification =====
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = 'fa-check-circle';
      if (type === 'error') icon = 'fa-exclamation-circle';
      if (type === 'warning') icon = 'fa-exclamation-triangle';
      
      toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <div class="toast-message">${escapeHtml(message)}</div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ===== Helper Functions =====
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateValue) {
      if (!dateValue) return 'غير معروف';
      
      let date;
      if (dateValue._seconds) {
        date = new Date(dateValue._seconds * 1000);
      } else {
        date = new Date(dateValue);
      }
      
      const now = new Date();
      const diff = now - date;
      const diffMinutes = Math.floor(diff / 60000);
      const diffHours = Math.floor(diff / 3600000);
      const diffDays = Math.floor(diff / 86400000);
      
      if (diffMinutes < 1) return 'الآن';
      if (diffMinutes < 60) return `منذ ${diffMinutes} دقيقة`;
      if (diffHours < 24) return `منذ ${diffHours} ساعة`;
      if (diffDays === 1) return 'أمس';
      if (diffDays < 7) return `منذ ${diffDays} أيام`;
      
      return date.toLocaleDateString('ar-EG', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function formatTime(dateValue) {
      if (!dateValue) return '';
      let date;
      if (dateValue._seconds) {
        date = new Date(dateValue._seconds * 1000);
      } else {
        date = new Date(dateValue);
      }
      return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }

    // ===== Load Messages =====
    async function loadMessages() {
      try {
        const response = await fetch('/api/messages', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.status === 401) {
          logout();
          return;
        }
        
        if (!response.ok) {
          throw new Error('فشل تحميل الرسائل');
        }
        
        messagesData = await response.json();
        renderMessages();
        updateStats();
        
        // Update last update time
        const now = new Date();
        document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('ar-EG', {
          hour: '2-digit',
          minute: '2-digit'
        });
        
      } catch (error) {
        console.error('Error loading messages:', error);
        showToast('فشل تحميل الرسائل', 'error');
        renderError(error.message);
      }
    }

    // ===== Render Messages =====
    function renderMessages() {
      const tbody = document.getElementById('messagesTableBody');
      
      if (!messagesData || messagesData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="no-data">
              <i class="fas fa-inbox"></i>
              لا توجد رسائل بعد
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = messagesData.map((msg, index) => {
        const messageId = msg.id || msg._id;
        const name = msg.name || 'غير معروف';
        const phone = msg.phone || 'غير متوفر';
        const message = msg.message || '';
        const createdAt = msg.createdAt || new Date();
        
        return `
          <tr>
            <td>
              <i class="fas fa-user-circle" style="color: var(--accent-primary); margin-left: 0.5rem;"></i>
              ${escapeHtml(name)}
            </td>
            <td>
              <i class="fas fa-phone-alt" style="color: var(--accent-secondary); margin-left: 0.5rem;"></i>
              ${escapeHtml(phone)}
            </td>
            <td class="message-preview" title="${escapeHtml(message)}">
              ${escapeHtml(message.substring(0, 80))}${message.length > 80 ? '...' : ''}
            </td>
            <td>
              <i class="far fa-calendar-alt" style="color: var(--accent-primary); margin-left: 0.3rem;"></i>
              ${formatDate(createdAt)}
              <div class="badge-date">${formatTime(createdAt)}</div>
            </td>
            <td>
              <button class="delete-btn" onclick="openDeleteModal('${messageId}', '${escapeHtml(name)}')" title="حذف الرسالة">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderError(errorMsg) {
      const tbody = document.getElementById('messagesTableBody');
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="no-data">
            <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
            ${escapeHtml(errorMsg)}
            <br>
            <button onclick="loadMessages()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--accent-primary); border: none; border-radius: 2rem; cursor: pointer;">إعادة المحاولة</button>
          </td>
        </tr>
      `;
    }

    // ===== Update Statistics =====
    function updateStats() {
      const total = messagesData.length;
      document.getElementById('totalMessages').textContent = total;
      
      const today = new Date().toDateString();
      const todayCount = messagesData.filter(msg => {
        let msgDate;
        if (msg.createdAt?._seconds) {
          msgDate = new Date(msg.createdAt._seconds * 1000);
        } else if (msg.createdAt) {
          msgDate = new Date(msg.createdAt);
        } else {
          return false;
        }
        return msgDate.toDateString() === today;
      }).length;
      document.getElementById('todayMessages').textContent = todayCount;
      
      const uniquePhones = new Set(messagesData.map(m => m.phone)).size;
      document.getElementById('uniqueSenders').textContent = uniquePhones;
    }

    // ===== Delete Message =====
    function openDeleteModal(messageId, name) {
      currentDeleteId = messageId;
      const modal = document.getElementById('deleteModal');
      const messageText = document.getElementById('deleteMessageText');
      messageText.innerHTML = `هل أنت متأكد من حذف رسالة <strong>${escapeHtml(name)}</strong>؟`;
      modal.classList.add('active');
    }

    function closeDeleteModal() {
      const modal = document.getElementById('deleteModal');
      modal.classList.remove('active');
      currentDeleteId = null;
    }

    async function deleteMessage() {
      if (!currentDeleteId) return;
      
      const confirmBtn = document.getElementById('confirmDeleteBtn');
      const originalText = confirmBtn.innerHTML;
      confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
      confirmBtn.disabled = true;
      
      try {
        const response = await fetch(`/api/messages/${currentDeleteId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.status === 401) {
          logout();
          return;
        }
        
        if (response.ok) {
          showToast('تم حذف الرسالة بنجاح', 'success');
          closeDeleteModal();
          await loadMessages();
        } else {
          const error = await response.json().catch(() => ({}));
          showToast(error.error || 'فشل حذف الرسالة', 'error');
        }
      } catch (error) {
        console.error('Error deleting message:', error);
        showToast('حدث خطأ في الاتصال', 'error');
      } finally {
        confirmBtn.innerHTML = originalText;
        confirmBtn.disabled = false;
      }
    }

    // ===== Logout =====
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('savedUsername');
      showToast('تم تسجيل الخروج بنجاح', 'success');
      setTimeout(() => {
        window.location.href = '/login';
      }, 500);
    }

    // ===== Auto Refresh =====
    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(loadMessages, 30000);
    }

    // ===== Event Listeners =====
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('refreshBtn').addEventListener('click', () => {
      loadMessages();
      showToast('جاري تحديث الرسائل...', 'warning');
    });
    document.getElementById('confirmDeleteBtn').addEventListener('click', deleteMessage);
    document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);
    
    // Close modal on overlay click
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) {
        closeDeleteModal();
      }
    });
    
    // Close modal on ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDeleteModal();
      }
    });

    // ===== Initialize =====
    loadMessages();
    startAutoRefresh();
  </script>
</body>
</html>
