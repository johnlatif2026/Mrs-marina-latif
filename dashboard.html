<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - الرسائل</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; padding:0; }
header { background:#4CAF50; color:white; padding:20px; text-align:center; }
.container { padding:20px; }
table { width:100%; border-collapse: collapse; background:white; box-shadow:0 0 10px rgba(0,0,0,0.1); }
th, td { padding:10px; border-bottom:1px solid #ddd; text-align:left; }
th { background:#4CAF50; color:white; }
tr:hover { background:#f1f1f1; }
.logout { float:right; background:#f44336; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; }
.logout:hover { background:#e53935; }
</style>
</head>
<body>

<header>
  <h1>لوحة الرسائل الواردة</h1>
  <button class="logout" onclick="logout()">تسجيل الخروج</button>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>الاسم</th>
        <th>البريد الإلكتروني</th>
        <th>الرسالة</th>
        <th>تاريخ الإرسال</th>
      </tr>
    </thead>
    <tbody id="messagesBody">
    </tbody>
  </table>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href = '/login';

async function loadMessages(){
  const res = await fetch('/api/messages', { headers:{ 'Authorization':'Bearer ' + token } });
  if(res.ok){
    const messages = await res.json();
    const tbody = document.getElementById('messagesBody');
    tbody.innerHTML = '';
    messages.forEach(msg => {
      let date;
      if(msg.createdAt){
        if(msg.createdAt._seconds) date = new Date(msg.createdAt._seconds*1000);
        else date = new Date(msg.createdAt);
      } else date = new Date();
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${msg.name}</td>
        <td>${msg.email}</td>
        <td>${msg.message}</td>
        <td>${date.toLocaleString()}</td>
      `;
      tbody.appendChild(tr);
    });
  } else {
    alert('فشل تحميل الرسائل');
  }
}

function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login';
}

loadMessages();
</script>

</body>
</html>
