<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0f2027;
  font-family:Arial;
}

.box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  width:100%;
  padding:10px;
  background:#00c9a7;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>تسجيل الدخول</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password">
<button onclick="login()">Login</button>

<script>
async function login(){
  const res = await fetch('/api/login',{
    method:'POST',
    body: JSON.stringify({user:user.value, pass:pass.value})
  });
  const data = await res.json();
  if(data.token){ localStorage.setItem("token",data.token); location.href="/dashboard.html"; }
}
</script>
</body>
</html>
