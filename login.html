<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>تسجيل الدخول</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Dark Mode Only - Rich & Elegant */
    :root {
      --bg-deep: #050807;
      --bg-elevated: #0c1410;
      --glass-bg: rgba(18, 28, 22, 0.75);
      --glass-border: rgba(94, 240, 163, 0.25);
      --accent-primary: #5ef0a3;
      --accent-glow: #3ad886;
      --accent-secondary: #6cc9ff;
      --text-primary: #f0faf2;
      --text-secondary: #b8d9c2;
      --input-bg: rgba(10, 20, 14, 0.8);
      --error-red: #ff8a7a;
      --success-green: #5ef0a3;
      --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.8);
      --shadow-glow: 0 0 20px rgba(94, 240, 163, 0.3);
      --gradient-primary: linear-gradient(135deg, #1e3326 0%, #0c1912 100%);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 30%, #1a3a2a, #030705);
      z-index: -2;
    }

    /* Subtle grid pattern */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(94, 240, 163, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94, 240, 163, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
      pointer-events: none;
    }

    /* Floating particles effect (lightweight) */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: rgba(94, 240, 163, 0.15);
      border-radius: 50%;
      animation: floatParticle 15s infinite linear;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      90% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    /* Login Card */
    .login-card {
      max-width: 480px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-xl), var(--shadow-glow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .login-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.9), 0 0 25px rgba(94, 240, 163, 0.4);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header with icons */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon-ring {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .icon-ring i {
      font-size: 2.2rem;
      color: var(--accent-primary);
      filter: drop-shadow(0 0 8px var(--accent-glow));
      animation: iconFloat 3s ease-in-out infinite;
      transition: transform 0.2s;
    }

    .icon-ring i:hover {
      transform: scale(1.1);
    }

    .icon-ring i:nth-child(2) { animation-delay: 0.4s; color: var(--accent-secondary); }
    .icon-ring i:nth-child(3) { animation-delay: 0.8s; }
    .icon-ring i:nth-child(4) { animation-delay: 1.2s; }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Form Styles */
    .login-form {
      margin-top: 1.8rem;
    }

    .input-field {
      position: relative;
      margin-bottom: 1.8rem;
    }

    .input-field i {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent-primary);
      font-size: 1.1rem;
      transition: all 0.2s;
      z-index: 2;
    }

    .input-field input {
      width: 100%;
      padding: 1rem 2.8rem 1rem 1rem;
      background: var(--input-bg);
      border: 1.5px solid rgba(94, 240, 163, 0.2);
      border-radius: 2rem;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      color: var(--text-primary);
      transition: all 0.25s ease;
      outline: none;
    }

    .input-field input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(94, 240, 163, 0.2);
      background: rgba(15, 30, 20, 0.9);
    }

    .input-field input:focus + i {
      color: var(--accent-secondary);
      transform: translateY(-50%) scale(1.1);
    }

    .input-field label {
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: all 0.2s;
      pointer-events: none;
      background: transparent;
      padding: 0 0.2rem;
    }

    .input-field input:focus ~ label,
    .input-field input:not(:placeholder-shown) ~ label {
      top: 0;
      right: 2rem;
      font-size: 0.7rem;
      background: var(--input-bg);
      padding: 0 0.4rem;
      color: var(--accent-primary);
      transform: translateY(-50%);
    }

    /* Options row */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.5rem 0;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .checkbox-label input {
      width: 1rem;
      height: 1rem;
      accent-color: var(--accent-primary);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--accent-primary);
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 500;
    }

    .forgot-link:hover {
      color: var(--accent-secondary);
      text-decoration: underline;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(105deg, var(--accent-primary), var(--accent-glow));
      border: none;
      border-radius: 3rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      color: #0a120e;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px rgba(58, 216, 134, 0.25);
    }

    .submit-btn i {
      transition: transform 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 28px rgba(58, 216, 134, 0.4);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Status Message */
    .status-message {
      margin-top: 1.5rem;
      padding: 0.8rem;
      border-radius: 2rem;
      text-align: center;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.4);
      transition: all 0.2s;
      min-height: 3.5rem;
    }

    .status-message.success {
      color: var(--success-green);
      background: rgba(94, 240, 163, 0.1);
    }

    .status-message.error {
      color: var(--error-red);
      background: rgba(255, 138, 122, 0.1);
    }

    .status-message.info {
      color: var(--accent-secondary);
    }

    /* Footer note */
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(94, 240, 163, 0.15);
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .login-footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .login-card {
        padding: 1.8rem 1.5rem;
        border-radius: 2rem;
      }
      .icon-ring i {
        font-size: 1.6rem;
      }
      .login-header h1 {
        font-size: 1.6rem;
      }
      .input-field input {
        padding: 0.9rem 2.5rem 0.9rem 1rem;
      }
      .form-options {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 380px) {
      .login-card {
        padding: 1.5rem 1.2rem;
      }
      .submit-btn {
        padding: 0.85rem;
        font-size: 1rem;
      }
    }

    /* Landscape mode optimization */
    @media (orientation: landscape) and (max-height: 550px) {
      body {
        padding: 1rem;
      }
      .login-card {
        padding: 1.2rem;
      }
      .icon-ring {
        margin-bottom: 0.5rem;
      }
      .input-field {
        margin-bottom: 1rem;
      }
    }

    /* Disable animations for reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #0c1410;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-primary);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <!-- Floating particles (lightweight decoration) -->
  <div class="particles" id="particles"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="icon-ring">
        <i class="fas fa-flask"></i>
        <i class="fas fa-microscope"></i>
        <i class="fas fa-atom"></i>
        <i class="fas fa-dna"></i>
      </div>
      <h1>مرحباً بك</h1>
      <p>تسجيل الدخول إلى منصة الأستاذة مارينا لطيف</p>
    </div>

    <form class="login-form" id="loginForm">
      <div class="input-field">
        <i class="fas fa-user-graduate"></i>
        <input type="text" id="username" name="username" placeholder=" " autocomplete="username" required>
        <label for="username">اسم المستخدم</label>
      </div>

      <div class="input-field">
        <i class="fas fa-key"></i>
        <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required>
        <label for="password">كلمة المرور</label>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe"> تذكرني
        </label>
        <a href="#" class="forgot-link" id="forgotPassword">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span>دخول</span>
        <i class="fas fa-arrow-left"></i>
      </button>
    </form>

    <div class="status-message" id="statusMessage"></div>

    <div class="login-footer">
      <i class="fas fa-chalkboard-user"></i> منصة تعليم العلوم | الأستاذة مارينا لطيف
    </div>
  </div>

  <script>
    (function() {
      // Create lightweight particles
      function createParticles() {
        const particlesContainer = document.getElementById('particles');
        if (!particlesContainer) return;
        
        const particleCount = window.innerWidth < 768 ? 15 : 30;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          const size = Math.random() * 4 + 2;
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDuration = Math.random() * 15 + 8 + 's';
          particle.style.animationDelay = Math.random() * 15 + 's';
          particlesContainer.appendChild(particle);
        }
      }
      
      createParticles();

      // Form handling
      const form = document.getElementById('loginForm');
      const statusDiv = document.getElementById('statusMessage');
      const submitBtn = document.getElementById('submitBtn');
      const rememberCheckbox = document.getElementById('rememberMe');
      
      // Load saved username if exists
      if (localStorage.getItem('savedUsername')) {
        const savedUsername = localStorage.getItem('savedUsername');
        document.getElementById('username').value = savedUsername;
        if (rememberCheckbox) rememberCheckbox.checked = true;
      }

      function setStatus(message, type = 'error') {
        statusDiv.textContent = message;
        statusDiv.className = 'status-message ' + type;
        
        if (type === 'success') {
          setTimeout(() => {
            if (statusDiv.textContent === message) {
              statusDiv.textContent = '';
              statusDiv.className = 'status-message';
            }
          }, 4000);
        }
      }

      async function handleLogin(username, password) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);
        
        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          if (response.ok) {
            const data = await response.json();
            if (data.token) {
              localStorage.setItem('token', data.token);
            }
            return { success: true };
          } else {
            let errorMsg = 'اسم المستخدم أو كلمة المرور غير صحيحة';
            try {
              const errData = await response.json();
              errorMsg = errData.error || errorMsg;
            } catch(e) {}
            return { success: false, error: errorMsg };
          }
        } catch (err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') {
            return { success: false, error: 'انتهت مهلة الاتصال، تحقق من اتصالك بالإنترنت' };
          }
          return { success: false, error: 'خطأ في الشبكة: ' + err.message };
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
          setStatus('❌ الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
          return;
        }
        
        // Save username if remember me checked
        if (rememberCheckbox.checked) {
          localStorage.setItem('savedUsername', username);
        } else {
          localStorage.removeItem('savedUsername');
        }
        
        // Disable button and show loading
        const originalBtnHTML = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
        submitBtn.disabled = true;
        setStatus('⏳ جاري تسجيل الدخول...', 'info');
        
        const result = await handleLogin(username, password);
        
        if (result.success) {
          setStatus('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1200);
        } else {
          setStatus('❌ ' + result.error, 'error');
          submitBtn.innerHTML = originalBtnHTML;
          submitBtn.disabled = false;
          
          // Clear password field for security
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      });
      
      // Forgot password handler (demo)
      const forgotLink = document.getElementById('forgotPassword');
      if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
          e.preventDefault();
          // Direct WhatsApp link - opens instantly without any message
          window.location.href = 'https://wa.me/201274445091';
        });
      }
      
      // Input focus improvements for mobile
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('touchstart', function() {
          this.style.fontSize = '16px';
        }, { passive: true });
      });
    })();
  </script>
</body>
</html>
